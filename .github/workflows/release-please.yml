name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  linux-binaries:
    name: Linux ${{ matrix.asset_arch }} ${{ matrix.backend }} binary
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset_arch: amd64
            backend: x11
            cargo_features: ""
          - runner: ubuntu-22.04
            asset_arch: amd64
            backend: wayland
            cargo_features: "--features wayland"
          - runner: ubuntu-22.04-arm
            asset_arch: arm64
            backend: x11
            cargo_features: ""
          - runner: ubuntu-22.04-arm
            asset_arch: arm64
            backend: wayland
            cargo_features: "--features wayland"
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            build-essential \
            cmake \
            lld \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxft-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrender-dev \
            libxfixes-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libpango1.0-dev \
            libgtk-3-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            wayland-protocols

      - name: Build binary
        run: cargo build --release --locked ${{ matrix.cargo_features }}

      - name: Upload binary
        run: |
          mkdir -p dist
          asset="dist/slippy-v${RELEASE_VERSION}-linux-${{ matrix.asset_arch }}-${{ matrix.backend }}"
          install -m 755 target/release/slippy "$asset"
          gh release upload "$RELEASE_TAG" "$asset" --clobber

  linux-appimages:
    name: Linux ${{ matrix.asset_arch }} ${{ matrix.backend }} AppImage
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset_arch: amd64
            backend: x11
            linuxdeploy_arch: x86_64
            cargo_features: ""
          - runner: ubuntu-22.04
            asset_arch: amd64
            backend: wayland
            linuxdeploy_arch: x86_64
            cargo_features: "--features wayland"
          - runner: ubuntu-22.04-arm
            asset_arch: arm64
            backend: x11
            linuxdeploy_arch: aarch64
            cargo_features: ""
          - runner: ubuntu-22.04-arm
            asset_arch: arm64
            backend: wayland
            linuxdeploy_arch: aarch64
            cargo_features: "--features wayland"
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Install AppImage build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            build-essential \
            cmake \
            desktop-file-utils \
            file \
            lld \
            libx11-dev \
            libxext-dev \
            libxft-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrender-dev \
            libxfixes-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libpango1.0-dev \
            libgtk-3-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            wayland-protocols \
            patchelf \
            pkg-config \
            wget

      - name: Build ${{ matrix.backend }} binary
        run: cargo build --release --locked ${{ matrix.cargo_features }}

      - name: Create AppImage AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/slippy AppDir/usr/bin/slippy
          cat > AppDir/usr/share/applications/slippy.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Slippy
          Comment=Native desktop text diff tool
          Exec=slippy
          Icon=slippy
          Categories=Utility;TextTools;
          Terminal=false
          DESKTOP
          cp assets/icons/png/slippy-256.png AppDir/usr/share/icons/hicolor/256x256/apps/slippy.png
          cp AppDir/usr/share/applications/slippy.desktop AppDir/slippy.desktop
          cp AppDir/usr/share/icons/hicolor/256x256/apps/slippy.png AppDir/slippy.png

      - name: Build AppImage
        run: |
          linuxdeploy="linuxdeploy-${{ matrix.linuxdeploy_arch }}.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/${linuxdeploy}"
          chmod +x "$linuxdeploy"
          "./${linuxdeploy}" --appimage-extract
          ARCH="${{ matrix.linuxdeploy_arch }}" ./squashfs-root/AppRun --appdir AppDir --output appimage
          appimage="$(find . -maxdepth 1 -name '*.AppImage' ! -name 'linuxdeploy-*.AppImage' -print -quit)"
          test -n "$appimage"
          mv "$appimage" "slippy-v${RELEASE_VERSION}-linux-${{ matrix.asset_arch }}-${{ matrix.backend }}.appimage"

      - name: Upload AppImage
        run: gh release upload "$RELEASE_TAG" "slippy-v${RELEASE_VERSION}-linux-${{ matrix.asset_arch }}-${{ matrix.backend }}.appimage" --clobber

  windows-binaries:
    name: Windows ${{ matrix.asset_arch }} binary
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            asset_arch: amd64
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            asset_arch: arm64
            target: aarch64-pc-windows-msvc
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Add Rust target
        shell: pwsh
        run: rustup target add ${{ matrix.target }}

      - name: Build binary
        shell: pwsh
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Upload binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $asset = "dist/slippy-v$env:RELEASE_VERSION-windows-${{ matrix.asset_arch }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/slippy.exe" $asset
          gh release upload "$env:RELEASE_TAG" $asset --clobber

  macos-universal-dmg:
    name: macOS universal DMG
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-15-intel
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Add Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build Intel binary
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Build Apple Silicon binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/slippy \
            target/aarch64-apple-darwin/release/slippy \
            -output "dist/slippy-universal"
          chmod 755 "dist/slippy-universal"
          lipo -info "dist/slippy-universal"

      - name: Create app bundle
        run: |
          app="dist/Slippy.app"
          rm -rf "$app" dist/Slippy.iconset
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources" dist/Slippy.iconset
          cp "dist/slippy-universal" "$app/Contents/MacOS/slippy"
          chmod 755 "$app/Contents/MacOS/slippy"
          cp assets/icons/png/slippy-16.png dist/Slippy.iconset/icon_16x16.png
          cp assets/icons/png/slippy-32.png dist/Slippy.iconset/icon_16x16@2x.png
          cp assets/icons/png/slippy-32.png dist/Slippy.iconset/icon_32x32.png
          cp assets/icons/png/slippy-64.png dist/Slippy.iconset/icon_32x32@2x.png
          cp assets/icons/png/slippy-128.png dist/Slippy.iconset/icon_128x128.png
          cp assets/icons/png/slippy-256.png dist/Slippy.iconset/icon_128x128@2x.png
          cp assets/icons/png/slippy-256.png dist/Slippy.iconset/icon_256x256.png
          cp assets/icons/png/slippy-512.png dist/Slippy.iconset/icon_256x256@2x.png
          cp assets/icons/png/slippy-512.png dist/Slippy.iconset/icon_512x512.png
          iconutil -c icns -o "$app/Contents/Resources/slippy.icns" dist/Slippy.iconset
          cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>Slippy</string>
            <key>CFBundleExecutable</key>
            <string>slippy</string>
            <key>CFBundleIconFile</key>
            <string>slippy</string>
            <key>CFBundleIdentifier</key>
            <string>dev.wwwhynot3.slippy</string>
            <key>CFBundleName</key>
            <string>Slippy</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${RELEASE_VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${RELEASE_VERSION}</string>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.developer-tools</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict "$app"

      - name: Create DMG
        run: |
          rm -rf dist/dmg
          mkdir -p dist/dmg
          cp -R "dist/Slippy.app" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create \
            -volname "Slippy" \
            -srcfolder "dist/dmg" \
            -ov \
            -format UDZO \
            "dist/slippy-v${RELEASE_VERSION}-macos-universal.dmg"
          hdiutil imageinfo "dist/slippy-v${RELEASE_VERSION}-macos-universal.dmg"

      - name: Upload DMG
        run: gh release upload "$RELEASE_TAG" "dist/slippy-v${RELEASE_VERSION}-macos-universal.dmg" --clobber
