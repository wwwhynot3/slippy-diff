name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release PR
        uses: googleapis/release-please-action@v4
        with:
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
