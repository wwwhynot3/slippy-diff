name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  linux-binaries:
    name: Linux ${{ matrix.asset_arch }} ${{ matrix.backend }} binary
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset_arch: amd64
            backend: x11
            cargo_features: ""
          - runner: ubuntu-22.04
            asset_arch: amd64
            backend: wayland
            cargo_features: "--features wayland"
          - runner: ubuntu-22.04-arm
            asset_arch: arm64
            backend: x11
            cargo_features: ""
          - runner: ubuntu-22.04-arm
            asset_arch: arm64
            backend: wayland
            cargo_features: "--features wayland"
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxft-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrender-dev \
            libxfixes-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libpango1.0-dev \
            libgtk-3-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            wayland-protocols

      - name: Build binary
        run: cargo build --release --locked ${{ matrix.cargo_features }}

      - name: Upload binary
        run: |
          mkdir -p dist
          asset="dist/slippy-v${RELEASE_VERSION}-linux-${{ matrix.asset_arch }}-${{ matrix.backend }}"
          install -m 755 target/release/slippy "$asset"
          gh release upload "$RELEASE_TAG" "$asset" --clobber

  linux-appimages:
    name: Linux ${{ matrix.asset_arch }} x11 AppImage
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset_arch: amd64
            linuxdeploy_arch: x86_64
          - runner: ubuntu-22.04-arm
            asset_arch: arm64
            linuxdeploy_arch: aarch64
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Install AppImage build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            desktop-file-utils \
            file \
            libx11-dev \
            libxext-dev \
            libxft-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrender-dev \
            libxfixes-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libpango1.0-dev \
            libgtk-3-dev \
            patchelf \
            pkg-config \
            python3 \
            wget

      - name: Build x11 binary
        run: cargo build --release --locked

      - name: Create AppImage AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/slippy AppDir/usr/bin/slippy
          cat > AppDir/usr/share/applications/slippy.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Slippy
          Comment=Native desktop text diff tool
          Exec=slippy
          Icon=slippy
          Categories=Utility;TextTools;
          Terminal=false
          DESKTOP
          python3 - <<'PY'
          import struct
          import zlib

          size = 256
          raw = bytearray()
          for y in range(size):
              raw.append(0)
              for x in range(size):
                  if 32 <= x < 224 and 32 <= y < 224:
                      r, g, b, a = 36, 105, 92, 255
                      if 72 <= x < 184 and 74 <= y < 92:
                          r, g, b = 234, 241, 239
                      if 72 <= x < 184 and 118 <= y < 136:
                          r, g, b = 234, 241, 239
                      if 72 <= x < 154 and 162 <= y < 180:
                          r, g, b = 234, 241, 239
                  else:
                      r, g, b, a = 0, 0, 0, 0
                  raw.extend((r, g, b, a))

          def chunk(kind, data):
              return (
                  struct.pack(">I", len(data))
                  + kind
                  + data
                  + struct.pack(">I", zlib.crc32(kind + data) & 0xFFFFFFFF)
              )

          png = (
              b"\x89PNG\r\n\x1a\n"
              + chunk(b"IHDR", struct.pack(">IIBBBBB", size, size, 8, 6, 0, 0, 0))
              + chunk(b"IDAT", zlib.compress(bytes(raw), 9))
              + chunk(b"IEND", b"")
          )
          with open("AppDir/usr/share/icons/hicolor/256x256/apps/slippy.png", "wb") as f:
              f.write(png)
          PY
          cp AppDir/usr/share/applications/slippy.desktop AppDir/slippy.desktop
          cp AppDir/usr/share/icons/hicolor/256x256/apps/slippy.png AppDir/slippy.png

      - name: Build AppImage
        run: |
          linuxdeploy="linuxdeploy-${{ matrix.linuxdeploy_arch }}.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/${linuxdeploy}"
          chmod +x "$linuxdeploy"
          "./${linuxdeploy}" --appimage-extract
          ARCH="${{ matrix.linuxdeploy_arch }}" ./squashfs-root/AppRun --appdir AppDir --output appimage
          appimage="$(find . -maxdepth 1 -name '*.AppImage' ! -name 'linuxdeploy-*.AppImage' -print -quit)"
          test -n "$appimage"
          mv "$appimage" "slippy-v${RELEASE_VERSION}-linux-${{ matrix.asset_arch }}-x11.AppImage"

      - name: Upload AppImage
        run: gh release upload "$RELEASE_TAG" "slippy-v${RELEASE_VERSION}-linux-${{ matrix.asset_arch }}-x11.AppImage" --clobber

  windows-binaries:
    name: Windows ${{ matrix.asset_arch }} binary
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            asset_arch: amd64
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            asset_arch: arm64
            target: aarch64-pc-windows-msvc
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Add Rust target
        shell: pwsh
        run: rustup target add ${{ matrix.target }}

      - name: Build binary
        shell: pwsh
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Upload binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $asset = "dist/slippy-v$env:RELEASE_VERSION-windows-${{ matrix.asset_arch }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/slippy.exe" $asset
          gh release upload "$env:RELEASE_TAG" $asset --clobber

  macos-universal-binary:
    name: macOS universal binary
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-15-intel
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Add Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build Intel binary
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Build Apple Silicon binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/slippy \
            target/aarch64-apple-darwin/release/slippy \
            -output "dist/slippy-v${RELEASE_VERSION}-macos-universal"
          chmod 755 "dist/slippy-v${RELEASE_VERSION}-macos-universal"
          lipo -info "dist/slippy-v${RELEASE_VERSION}-macos-universal"

      - name: Upload binary
        run: gh release upload "$RELEASE_TAG" "dist/slippy-v${RELEASE_VERSION}-macos-universal" --clobber
