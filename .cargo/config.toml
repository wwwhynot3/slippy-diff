# CachyOS/Arch x86_64: Rust's default self-contained linking (bundled lld)
# fails to find libgcc_s while linking the C++ FLTK static library, failing
# every build (including `cargo run --features wayland`) with `unable to find
# library -lgcc_s`. Use the system linker/glibc instead, which knows gcc's
# library search paths. This flag is not supported on Linux arm64.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-self-contained=no"]
