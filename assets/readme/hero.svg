  </g>

  <g transform="translate(84 214)">
    <text x="0" y="0" fill="#25231F" font-size="72" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="780">Paste-first diffing</text>
    <text x="0" y="84" fill="#25231F" font-size="72" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="780">without IDE overhead</text>

    <text x="0" y="170" fill="#6F685F" font-size="24" font-family="Segoe UI, Inter, Arial, sans-serif">Compare snippets, logs, prompts, config fragments, and generated text in</text>
    <text x="0" y="206" fill="#6F685F" font-size="24" font-family="Segoe UI, Inter, Arial, sans-serif">a quiet native window. No repo tree, clipboard watcher, or tray app.</text>
    <text x="0" y="242" fill="#6F685F" font-size="24" font-family="Segoe UI, Inter, Arial, sans-serif">Just two panes, one reliable diff, and a fast copy-review-close workflow.</text>
  </g>

