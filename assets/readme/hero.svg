<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Slippy README hero mockup</title>
  <desc id="desc">A polished hero graphic for the Slippy README with product messaging on the left and a native desktop diff window on the right.</desc>

  <defs>
