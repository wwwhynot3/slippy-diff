      <stop offset="0%" stop-color="#F8F5EE"/>
      <stop offset="100%" stop-color="#EEE7DA"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F8EFE1" stop-opacity="0"/>
      <stop offset="100%" stop-color="#E8DCC3" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF9"/>
      <stop offset="100%" stop-color="#F6F1E7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2F6F73"/>
      <stop offset="100%" stop-color="#6AA8AD"/>
    </linearGradient>
